<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSPL | Arya P.G.</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <!-- Navbar -->
        <div class="navbar">
            <!-- logo -->
            <div class="logo">
                <img src="img.jpg" alt="logo" />
                <div class="companyName">
                    <span>Satyaansh Softech</span>
                    Pvt. Ltd.
                </div>
            </div>

            <!-- Menu-Items -->
            <ul class="daysLink">
                <li onclick="loadPage('day1/index.html')">Day 1</li>
                <li onclick="loadPage('day2/index.html')">Day 2</li>
                <li onclick="loadPage('day3/index.html')">Day 3</li>
                <li onclick="loadPage('day4/index.html')">Day 4</li>
                <li onclick="loadPage('day5/index.html')">Day 5</li>
                <li onclick="loadPage('day6/index.html')">Day 6</li>
                <li onclick="loadPage('day7/index.html')">Day 7</li>
                <li onclick="loadPage('day8/index.html')">Day 8</li>

            </ul>

            <!-- right button -->
            <button class="hamburger">
                <img src="hmburger.png" alt="menu" />
            </button>
        </div>

        <!-- Days -->
        <iframe id="dayFrame" src="day1/index.html" width="100%" height="800">
        </iframe>
    </div>
    <script>
        const hamburger = document.querySelector(".hamburger");
        const daysLink = document.querySelector(".daysLink");

        hamburger.addEventListener("click", () => {
            daysLink.classList.toggle("active");
        });

        function loadPage(page) {
            let frame = document.getElementById("dayFrame")
            frame.src = page;
        }
    </script>
</body>

</html>
